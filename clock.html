<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock</title>

<style>
body{
    text-align:center;
    margin-top:100px;
    font-family:Arial;
    background:black;
    color:white;
}

#clock{
    font-size:50px;
}
</style>
</head>
<body>

<h2>Digital Clock</h2>

<div id="clock"></div>




<script>

function showTime(){

    let now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    let time = hours + ":" + minutes + ":" + seconds;
    let mean;
    if(hours>12||hours>24){
        mean='PM'
    }
    else{
        mean='AM'
    }
    
    document.getElementById("clock").innerText = time+" "+mean;
    //Run a function again and again after a fixed time.

}
    setInterval(showTime,1000);

</script>

</body>
</html>
